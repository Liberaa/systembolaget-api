image: node:20

stages:
  - test

cache:
  paths:
    - node_modules/

before_script:
  - npm install

newman_tests:
  stage: test
  script:
    - npm install -g newman
    - newman run BookVault-GraphQL.postman_collection.json -e production.postman_environment.json
  only:
    - branches
    - merge_requests